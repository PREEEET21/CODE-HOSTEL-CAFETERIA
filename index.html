<!DOCTYPE html>
<html>
<head>
  <title>Code Hostel Mess Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }
    input, select, button {
      width: 90%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }
    button {
      background: #22c55e;
      font-weight: bold;
    }
    #msg {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>🍽️ Code Hostel Mess Attendance</h2>

<form id="form">
  <input type="tel" id="mobile" placeholder="Enter Mobile Number" required pattern="[0-9]{10}">

  <select id="meal" required>
    <option value="">Select Meal</option>
    <option>Breakfast</option>
    <option>Lunch</option>
    <option>Dinner</option>
  </select>

  <button type="submit">Mark Attendance</button>
</form>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAEiAGwYe0ygHCpXBtmpjwYBY2OucdwLxQ",
  authDomain: "codehostelcafeteria.firebaseapp.com",
  databaseURL: "https://codehostelcafeteria-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "codehostelcafeteria",
  storageBucket: "codehostelcafeteria.firebasestorage.app",
  messagingSenderId: "1048067218132",
  appId: "1:1048067218132:web:890fb4ba34c064ad87f941",
  measurementId: "G-DD3ZYJ1TC6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  let mobile = document.getElementById("mobile").value;
  let meal   = document.getElementById("meal").value;
  let msg    = document.getElementById("msg");
  msg.innerText = "Checking...";

  const today = new Date().toISOString().split("T")[0];

  // 1. Check student exists
  const stuRef = ref(db, "students/" + mobile);
  const stuSnap = await get(stuRef);

  if(!stuSnap.exists()){
    msg.innerText = "❌ Student Not Registered";
    return;
  }

  let student = stuSnap.val();

  // 2. Check duplicate
  const attRef = ref(db, `attendance/${today}/${mobile}/${meal}`);
  const attSnap = await get(attRef);

  if(attSnap.exists()){
    msg.innerText = "⚠ Attendance Already Taken";
    return;
  }

  // 3. Save attendance
  await set(attRef, true);

  msg.innerText = `✅ Attendance Marked for ${student.name}`;
});
</script>
</body>
</html>
